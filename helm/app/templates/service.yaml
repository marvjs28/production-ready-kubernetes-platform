apiVersion: v1
kind: Service
metadata:
  name: sre-demo-api
  labels:
    app: sre-demo-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: sre-demo-api
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http