apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-demo-api
  labels:
    app: sre-demo-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: sre-demo-api
  template:
    metadata:
      labels:
        app: sre-demo-api
    spec:
      containers:
        - name: sre-demo-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}